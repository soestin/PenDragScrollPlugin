name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PenDragScroll.csproj

      - name: Build
        run: dotnet build PenDragScroll.csproj -c Release --no-restore

      - name: Package release zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/PenDragScroll
          cp bin/Release/net8.0/PenDragScroll.dll release/PenDragScroll/
          cp metadata.json release/PenDragScroll/
          cp LICENSE release/PenDragScroll/
          cp README.md release/PenDragScroll/
          cd release
          zip -r PenDragScroll-${GITHUB_REF_NAME}.zip PenDragScroll

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/PenDragScroll-${{ github.ref_name }}.zip
          generate_release_notes: true
