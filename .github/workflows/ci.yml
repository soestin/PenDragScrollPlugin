name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PenDragScroll.csproj

      - name: Build
        run: dotnet build PenDragScroll.csproj -c Release --no-restore

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp bin/Release/net8.0/PenDragScroll.dll dist/
          cp metadata.json dist/
          cp LICENSE dist/
          cp README.md dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PenDragScroll-${{ matrix.os }}
          path: dist/
